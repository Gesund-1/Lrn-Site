<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JS Runner | JavaScript Code Executor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            font-family: 'Segoe UI', 'Fira Code', 'Monaco', 'Cascadia Code', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .runner-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(72, 187, 255, 0.15);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .header {
            background: rgba(10, 14, 23, 0.8);
            padding: 1rem 1.8rem;
            border-bottom: 1px solid rgba(56, 189, 248, 0.4);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .title-section h1 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #1f2a3e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #e2e8f0;
            border: 1px solid #334155;
        }

        button i {
            font-style: normal;
            font-weight: bold;
            font-size: 1rem;
        }

        button#runBtn {
            background: #3b82f6;
            border-color: #60a5fa;
            color: white;
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
        }

        button#runBtn:hover {
            background: #2563eb;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(59,130,246,0.4);
        }

        button#clearBtn {
            background: #2d3748;
            border-color: #4a5568;
        }

        button#clearBtn:hover {
            background: #3f4a60;
            transform: scale(1.02);
        }

        button#resetEditorBtn {
            background: #1e293b;
            border-color: #475569;
        }

        button#resetEditorBtn:hover {
            background: #334155;
        }

        .main-panel {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }

        .editor-area {
            flex: 1.2;
            min-width: 280px;
            padding: 1.5rem;
            border-right: 1px solid rgba(71, 85, 105, 0.5);
        }

        .output-area {
            flex: 0.9;
            min-width: 260px;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .section-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #a0afc0;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-left: 3px solid #3b82f6;
            padding-left: 10px;
        }

        .section-label span:first-child {
            font-weight: 600;
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            height: 420px;
            background: #0f172ad9;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 18px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #e2e8f0;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            tab-size: 4;
        }

        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .output-box {
            background: #0a0f1c;
            border-radius: 20px;
            border: 1px solid #334155;
            min-height: 420px;
            max-height: 420px;
            overflow-y: auto;
            padding: 16px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13.5px;
        }

        .log-line {
            padding: 6px 0;
            border-bottom: 1px solid #1e293b;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            color: #cbd5e6;
        }

        .log-error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border-left: 3px solid #ef4444;
            padding-left: 10px;
            margin: 4px 0;
        }

        .log-info {
            color: #94a3b8;
        }

        .log-success {
            color: #4ade80;
        }

        .log-warn {
            color: #facc15;
        }

        .empty-output {
            color: #5b6e8c;
            text-align: center;
            padding: 2rem 0;
            font-style: italic;
        }

        .footer-info {
            padding: 12px 20px;
            border-top: 1px solid #1e293b;
            font-size: 0.7rem;
            text-align: right;
            color: #5f7f9e;
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111827;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d3a4e;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4b556b;
        }

        @media (max-width: 780px) {
            body {
                padding: 12px;
            }
            .editor-area, .output-area {
                flex: auto;
                width: 100%;
                border-right: none;
            }
            .editor-area {
                border-bottom: 1px solid #334155;
            }
            textarea {
                height: 320px;
            }
            .output-box {
                min-height: 320px;
                max-height: 320px;
            }
        }
    </style>
</head>
<body>
<div class="runner-container">
    <div class="header">
        <div class="title-section">
            <h1>JS Runner</h1>
            <div class="badge">JavaScript Sandbox</div>
        </div>
        <div class="controls">
            <button id="runBtn">
                <i>▶</i> Run Code
            </button>
            <button id="clearBtn">
                <i>⌧</i> Clear Output
            </button>
            <button id="resetEditorBtn">
                <i>↺</i> Reset Example
            </button>
        </div>
    </div>

    <div class="main-panel">
        <div class="editor-area">
            <div class="section-label">
                <span>JavaScript Editor</span>
                <span style="font-size: 11px;">ES6 supported</span>
            </div>
            <textarea id="codeEditor" spellcheck="false">// Selamat datang di JS Runner!
// Tulis kode JavaScript apapun di sini.
// Contoh: fungsi, loop, console.log

function greet(name) {
    return `Halo, ${name}! Selamat menjalankan kode.`;
}

console.log(greet("Programmer"));
console.log("Coba hitung: ", 42 * 3.14);

// Loop 1-5 (setiap angka muncul SEKALI)
for(let i = 1; i <= 5; i++) {
    console.log("Angka ke-" + i);
}

// Demo object & array
const data = [1, 2, 3, 4, 5];
const doubled = data.map(x => x * 2);
console.log("Array asli:", data);
console.log("Hasil kali dua:", doubled);

console.warn("Ini adalah peringatan contoh.");
console.info("Info: Kode berjalan di sandbox aman.");</textarea>
        </div>
        <div class="output-area">
            <div class="section-label">
                <span>Console Output</span>
                <span style="font-size: 11px;">repl-like</span>
            </div>
            <div id="outputContainer" class="output-box">
                <div class="empty-output">Klik 'Run Code' untuk menjalankan script...</div>
            </div>
        </div>
    </div>
    <div class="footer-info">
        JS Runner | Eksekusi kode JavaScript secara realtime | console.log, warn, error, info didukung
    </div>
</div>

<script>
    (function(){
        // Elemen DOM
        const editorTextarea = document.getElementById('codeEditor');
        const outputContainer = document.getElementById('outputContainer');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resetBtn = document.getElementById('resetEditorBtn');
        
        // Simpan console asli
        const originalConsole = window.console;
        
        // Fungsi untuk menambah log ke output container
        function addLog(message, type = 'log') {
            // Hapus pesan placeholder jika ada
            const placeholder = outputContainer.querySelector('.empty-output');
            if (placeholder && outputContainer.children.length === 1 && placeholder) {
                outputContainer.innerHTML = '';
            }

            const logEntry = document.createElement('div');
            logEntry.classList.add('log-line');

            // Menentukan kelas berdasarkan tipe log
            switch(type) {
                case 'error':
                    logEntry.classList.add('log-error');
                    break;
                case 'warn':
                    logEntry.classList.add('log-warn');
                    break;
                case 'info':
                    logEntry.classList.add('log-info');
                    break;
                case 'success':
                    logEntry.classList.add('log-success');
                    break;
                default:
                    logEntry.classList.add('log-info');
            }

            // Format pesan
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
            
            let prefix = '';
            if (type === 'error') prefix = '⛔ ';
            else if (type === 'warn') prefix = '⚠️ ';
            else if (type === 'info') prefix = 'ℹ️ ';
            else if (type === 'success') prefix = '✓ ';
            else prefix = '> ';

            // Tampilkan pesan
            let content = message;
            if (typeof message === 'object') {
                try {
                    content = JSON.stringify(message, null, 2);
                } catch(e) {
                    content = String(message);
                }
            }
            logEntry.textContent = `${timeStr} ${prefix}${content}`;
            outputContainer.appendChild(logEntry);
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }

        // Bersihkan output
        function clearOutput() {
            outputContainer.innerHTML = '';
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-output';
            emptyDiv.textContent = 'Output bersih. Jalankan kode untuk melihat hasil.';
            outputContainer.appendChild(emptyDiv);
        }

        // Fungsi untuk menjalankan kode
        function runCode() {
            const code = editorTextarea.value;
            
            if (!code.trim()) {
                clearOutput();
                addLog('Tidak ada kode untuk dijalankan', 'warn');
                return;
            }
            
            // Bersihkan output
            clearOutput();
            
            // Buat logger untuk menangkap console
            const customConsole = {
                log: (...args) => {
                    const message = args.map(arg => {
                        if (typeof arg === 'object') {
                            try {
                                return JSON.stringify(arg);
                            } catch(e) {
                                return String(arg);
                            }
                        }
                        return String(arg);
                    }).join(' ');
                    addLog(message, 'log');
                    originalConsole.log(...args);
                },
                error: (...args) => {
                    const message = args.map(arg => {
                        if (arg instanceof Error) return arg.stack || arg.message;
                        if (typeof arg === 'object') {
                            try {
                                return JSON.stringify(arg);
                            } catch(e) {
                                return String(arg);
                            }
                        }
                        return String(arg);
                    }).join(' ');
                    addLog(message, 'error');
                    originalConsole.error(...args);
                },
                warn: (...args) => {
                    const message = args.map(arg => {
                        if (typeof arg === 'object') {
                            try {
                                return JSON.stringify(arg);
                            } catch(e) {
                                return String(arg);
                            }
                        }
                        return String(arg);
                    }).join(' ');
                    addLog(message, 'warn');
                    originalConsole.warn(...args);
                },
                info: (...args) => {
                    const message = args.map(arg => {
                        if (typeof arg === 'object') {
                            try {
                                return JSON.stringify(arg);
                            } catch(e) {
                                return String(arg);
                            }
                        }
                        return String(arg);
                    }).join(' ');
                    addLog(message, 'info');
                    originalConsole.info(...args);
                },
                debug: (...args) => {
                    const message = args.map(arg => {
                        if (typeof arg === 'object') {
                            try {
                                return JSON.stringify(arg);
                            } catch(e) {
                                return String(arg);
                            }
                        }
                        return String(arg);
                    }).join(' ');
                    addLog(message, 'info');
                    originalConsole.debug(...args);
                },
                table: (data) => {
                    if (Array.isArray(data) || (typeof data === 'object' && data !== null)) {
                        try {
                            const str = JSON.stringify(data, null, 2);
                            addLog(`[Table]\n${str}`, 'log');
                            originalConsole.table(data);
                        } catch(e) {
                            addLog('[Table] cannot display', 'warn');
                        }
                    } else {
                        addLog('[Table] non-table data: ' + String(data), 'log');
                    }
                }
            };
            
            // Ganti console sementara
            window.console = customConsole;
            
            try {
                // Gunakan Function daripada eval untuk keamanan
                const execute = new Function(code);
                execute();
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
                originalConsole.error(error);
            } finally {
                // Kembalikan console asli
                window.console = originalConsole;
            }
        }
        
        // Event handler untuk reset editor
        function resetEditor() {
            const defaultCode = `// Selamat datang di JS Runner!
// Tulis kode JavaScript apapun di sini.
// Contoh: fungsi, loop, console.log

function greet(name) {
    return \`Halo, \${name}! Selamat menjalankan kode.\`;
}

console.log(greet("Programmer"));
console.log("Coba hitung: ", 42 * 3.14);

// Loop 1-5 (setiap angka muncul SEKALI)
for(let i = 1; i <= 5; i++) {
    console.log("Angka ke-" + i);
}

// Demo object & array
const data = [1, 2, 3, 4, 5];
const doubled = data.map(x => x * 2);
console.log("Array asli:", data);
console.log("Hasil kali dua:", doubled);

console.warn("Ini adalah peringatan contoh.");
console.info("Info: Kode berjalan di sandbox aman.");`;
            
            editorTextarea.value = defaultCode;
        }
        
        // Attach event listeners
        runBtn.addEventListener('click', runCode);
        clearBtn.addEventListener('click', clearOutput);
        resetBtn.addEventListener('click', resetEditor);
        
        // Shortcut: Ctrl+Enter atau Cmd+Enter
        editorTextarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });
        
        // Jalankan contoh pertama kali
        setTimeout(() => {
            runCode();
        }, 100);
    })();
</script>
<script src="home-button.js"></script>
</body>
</html>
