        }

            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            color: #1f4e6e;
            background: #ffffffcc;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .alpha-btn.active {
            background: #1f4e6e;
            color: white;
            box-shadow: 0 6px 12px -6px rgba(30,58,95,0.4);
            transform: scale(1.02);
        }

        .alpha-btn:hover:not(.active) {
            background: #cbdde9;
            transform: translateY(-2px);
        }

        .group-section {
            margin-bottom: 2rem;
            animation: fadeUp 0.35s ease;
        }

            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 0 0.5rem 0.8rem 0.5rem;
            border-bottom: 3px solid #ffc10780;
        }

            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #2c5a7a, #1e3a5f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

            background: #eef2f6;
            border-radius: 40px;
            padding: 2px 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.3rem;
            margin-top: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.2rem 1.4rem;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,245,0.7);
            box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.08);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-6px);
            background: white;
            box-shadow: 0 20px 30px -12px rgba(0, 20, 40, 0.2);
            border-color: #ffc10760;
        }

            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(125deg, #0f2c3f, #2c607e);

            color: transparent;
            display: inline-block;

            color: #2c5a6e;
            font-weight: 500;
            line-height: 1.4;
            margin: 8px 0 6px;
            border-left: 3px solid #ffb347;

        }

            background: #f8fafc;
            border-radius: 2rem;

        }

            margin-top: 3rem;
            font-size: 0.8rem;

        }

            from {

                transform: translateY(12px);
            }
            to {

            }

                width: 38px;
                height: 38px;
                font-size: 0.9rem;

    let currentFilterLetter = "ALL";
    let currentSearchQuery = "";

    const contentGroupsDiv = document.getElementById("contentGroups");
    const alphabetFilterContainer = document.getElementById("alphabetFilterContainer");
    const searchInput = document.getElementById("searchInput");
    const totalCountSpan = document.getElementById("totalCount");
    const groupCountSpan = document.getElementById("groupCount");

    function getFirstLetter(abbr) {
        if (!abbr || abbr.length === 0) return "#";
        let firstChar = abbr.charAt(0).toUpperCase();
        if (firstChar >= 'A' && firstChar <= 'Z') return firstChar;
        return "#";
    }

    function filterData() {
        let filtered = [...abbreviationsData];
        if (currentFilterLetter !== "ALL") {
            filtered = filtered.filter(item => getFirstLetter(item.abbr) === currentFilterLetter);
        }
        if (currentSearchQuery.trim() !== "") {
            const query = currentSearchQuery.trim().toLowerCase();
            filtered = filtered.filter(item => 
                item.abbr.toLowerCase().includes(query) || 
                item.full.toLowerCase().includes(query)
            );
        }
        return filtered;
    }

    function groupByLetter(data) {
        const groups = new Map();
        for (let item of data) {
            const letter = getFirstLetter(item.abbr);
            if (!groups.has(letter)) groups.set(letter, []);
            groups.get(letter).push(item);
        }
        const sortedKeys = Array.from(groups.keys()).sort((a,b) => {
            if (a === "#") return 1;
            if (b === "#") return -1;
            return a.localeCompare(b);
        });
        const sortedGroups = new Map();
        for (let k of sortedKeys) {
            sortedGroups.set(k, groups.get(k));
        }
        return sortedGroups;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function render() {
        const filteredData = filterData();
        const grouped = groupByLetter(filteredData);
        const totalItems = filteredData.length;
        const totalGroups = grouped.size;
        totalCountSpan.innerText = totalItems;
        groupCountSpan.innerText = totalGroups;

        if (totalItems === 0) {
            contentGroupsDiv.innerHTML = `<div class="empty-state"><h3>Tidak ada istilah ditemukan</h3><p>Coba ubah filter atau cari kata kunci lain</p></div>`;
            return;
        }

        let html = "";
        for (let [letter, items] of grouped.entries()) {
            items.sort((a,b) => a.abbr.localeCompare(b.abbr));
            html += `
                <div class="group-section">
                    <div class="group-header">
                        <span class="group-letter">${letter === "#" ? "# Lainnya" : letter}</span>
                        <span class="group-count">${items.length} entri</span>
                    </div>
                    <div class="card-grid">
            `;
            for (let item of items) {
                html += `
                    <div class="card" data-abbr="${escapeHtml(item.abbr)}" data-full="${escapeHtml(item.full)}">
                        <div class="card-abbr">${escapeHtml(item.abbr)}</div>
                        <div class="card-full">${escapeHtml(item.full)}</div>
                    </div>
                `;
            }
            html += `</div></div>`;
        }
        contentGroupsDiv.innerHTML = html;

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const fullText = card.getAttribute('data-full') || '';
                const abbrText = card.getAttribute('data-abbr') || '';
                const copyContent = `${abbrText} : ${fullText}`;
                navigator.clipboard.writeText(copyContent).then(() => {
                    const toast = document.createElement('div');
                    toast.innerText = `"${abbrText}" disalin ke clipboard`;
                    toast.style.position = 'fixed';
                    toast.style.bottom = '80px';
                    toast.style.left = '50%';
                    toast.style.transform = 'translateX(-50%)';
                    toast.style.background = '#1f3e48';
                    toast.style.color = 'white';
                    toast.style.padding = '10px 20px';
                    toast.style.borderRadius = '40px';
                    toast.style.fontWeight = '500';
                    toast.style.zIndex = '9999';
                    toast.style.fontSize = '0.85rem';
                    toast.style.backdropFilter = 'blur(8px)';
                    toast.style.boxShadow = '0 6px 14px rgba(0,0,0,0.1)';
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 1800);
                }).catch(() => {
                    alert("Gagal menyalin, silakan coba lagi.");
                });
            });
        });
    }

    function buildAlphabetFilters() {
        const uniqueLetters = new Set();
        abbreviationsData.forEach(item => {
            const letter = getFirstLetter(item.abbr);
            uniqueLetters.add(letter);
        });
        const sortedLetters = Array.from(uniqueLetters).sort((a,b) => {
            if (a === "#") return 1;
            if (b === "#") return -1;
            return a.localeCompare(b);
        });
        let btnsHtml = `<button class="alpha-btn ${currentFilterLetter === "ALL" ? 'active' : ''}" data-letter="ALL">ALL</button>`;
        sortedLetters.forEach(letter => {
            btnsHtml += `<button class="alpha-btn ${currentFilterLetter === letter ? 'active' : ''}" data-letter="${letter}">${letter}</button>`;
        });
        alphabetFilterContainer.innerHTML = btnsHtml;
        
        document.querySelectorAll('.alpha-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const letter = btn.getAttribute('data-letter');
                if (letter === "ALL") {
                    currentFilterLetter = "ALL";
                } else {
                    currentFilterLetter = letter;
                }
                document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                render();
            });
        });
    }

    let debounceTimer;
    function setupSearch() {
        searchInput.addEventListener('input', function(e) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                currentSearchQuery = e.target.value;
                render();
            }, 280);
        });
    }

    function init() {
        buildAlphabetFilters();
        setupSearch();
        render();
    }

    init();
</script>
